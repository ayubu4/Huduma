<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chagua Huduma</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #25D366;
      --green-dark: #128C7E;
      --green-light: #DCF8C6;
      --bg: #0a0f0d;
      --surface: #111a14;
      --card: #162019;
      --border: #1e3326;
      --text: #e8f5ea;
      --muted: #6b9e78;
      --accent: #25D366;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      position: relative;
      overflow-x: hidden;
    }

    /* Background glow */
    body::before {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(37,211,102,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Header / Brand */
    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
      padding: 0 4px;
    }

    .wa-icon {
      width: 52px;
      height: 52px;
      background: var(--green);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
      box-shadow: 0 0 20px rgba(37,211,102,0.35);
    }

    .header-text h1 {
      font-family: 'Sora', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: var(--text);
      line-height: 1.2;
    }

    .header-text p {
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
    }

    /* Chat bubble intro */
    .bubble {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px 18px 18px 18px;
      padding: 14px 18px;
      margin-bottom: 20px;
      font-size: 14px;
      line-height: 1.6;
      color: #c9e4cd;
      position: relative;
      animation: fadeUp 0.6s 0.15s ease both;
      opacity: 0;
    }

    .bubble::before {
      content: '';
      position: absolute;
      top: 0; left: -1px;
      width: 14px; height: 14px;
      background: var(--card);
      border-left: 1px solid var(--border);
      border-top: 1px solid var(--border);
      clip-path: polygon(0 0, 100% 0, 0 100%);
    }

    .bubble time {
      display: block;
      text-align: right;
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
    }

    /* Form card */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px 20px;
      animation: fadeUp 0.6s 0.25s ease both;
      opacity: 0;
    }

    .section-label {
      font-family: 'Sora', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 14px;
    }

    /* Service buttons */
    .services {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 24px;
    }

    .service-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: left;
      width: 100%;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14.5px;
      font-weight: 500;
      position: relative;
      overflow: hidden;
    }

    .service-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(37,211,102,0.07), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .service-btn:hover {
      border-color: rgba(37,211,102,0.5);
      transform: translateX(4px);
    }

    .service-btn:hover::after { opacity: 1; }

    .service-btn.selected {
      border-color: var(--green);
      background: linear-gradient(135deg, #162c1d, #0e1f14);
      box-shadow: 0 0 0 1px rgba(37,211,102,0.2), 0 4px 16px rgba(37,211,102,0.1);
    }

    .service-btn.selected::after { opacity: 1; }

    .service-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      background: rgba(37,211,102,0.08);
      border: 1px solid rgba(37,211,102,0.15);
      transition: all 0.2s;
    }

    .service-btn.selected .service-icon {
      background: rgba(37,211,102,0.18);
      border-color: rgba(37,211,102,0.4);
    }

    .service-info { flex: 1; }
    .service-name { font-weight: 600; font-size: 14.5px; }
    .service-desc { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .check {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      font-size: 12px;
    }

    .service-btn.selected .check {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }

    /* Name input */
    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .input-group input {
      width: 100%;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 13px 16px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-group input:focus {
      border-color: var(--green);
    }

    .input-group input::placeholder { color: var(--muted); }

    /* Submit button */
    .submit-btn {
      width: 100%;
      background: var(--green);
      color: #0a2010;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-family: 'Sora', sans-serif;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s ease;
      letter-spacing: 0.02em;
      box-shadow: 0 4px 20px rgba(37,211,102,0.3);
    }

    .submit-btn:hover {
      background: #20c85e;
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(37,211,102,0.4);
    }

    .submit-btn:active { transform: translateY(0); }

    .submit-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* Success state */
    .success {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 12px 0;
      gap: 12px;
    }

    .success.show { display: flex; animation: fadeUp 0.5s ease; }

    .success-icon {
      width: 64px;
      height: 64px;
      background: rgba(37,211,102,0.15);
      border: 2px solid var(--green);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }

    .success h3 {
      font-family: 'Sora', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--green);
    }

    .success p { font-size: 13.5px; color: var(--muted); line-height: 1.6; }

    .wa-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--green);
      color: #0a2010;
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: 14px;
      padding: 12px 24px;
      border-radius: 12px;
      text-decoration: none;
      margin-top: 4px;
      transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(37,211,102,0.3);
    }

    .wa-link:hover { background: #20c85e; transform: translateY(-2px); }

    /* Counter */
    .counter {
      font-size: 12px;
      color: var(--muted);
      text-align: right;
      margin-bottom: 14px;
      padding-top: 2px;
    }

    .counter span { color: var(--green); font-weight: 600; }
  </style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="wa-icon">💬</div>
    <div class="header-text">
      <h1>Digital Services</h1>
      <p>Chagua huduma unayohitaji</p>
    </div>
  </div>

  <!-- Chat bubble -->
  <div class="bubble">
    Habari! 👋 Karibu. Tafadhali chagua huduma unayohitaji na tutawasiliana nawe haraka iwezekanavyo kupitia WhatsApp.
    <time id="msgTime"></time>
  </div>

  <!-- Form -->
  <div class="form-card">

    <!-- Name input -->
    <div class="input-group">
      <label>Jina lako</label>
      <input type="text" id="userName" placeholder="Andika jina lako hapa..." />
    </div>

    <div class="section-label">Huduma zinazopatikana</div>
    <div class="counter">Umechagua: <span id="countDisplay">0</span> / 1</div>

    <div class="services" id="serviceList">

      <button class="service-btn" data-service="Instagram Optimization" onclick="selectService(this)">
        <div class="service-icon">📸</div>
        <div class="service-info">
          <div class="service-name">Instagram Optimization</div>
          <div class="service-desc">Boresha ukurasa wako wa Instagram</div>
        </div>
        <div class="check">✓</div>
      </button>

      <button class="service-btn" data-service="Sponsored (Meta Ads)" onclick="selectService(this)">
        <div class="service-icon">🎯</div>
        <div class="service-info">
          <div class="service-name">Sponsored (Meta Ads)</div>
          <div class="service-desc">Matangazo ya Facebook & Instagram</div>
        </div>
        <div class="check">✓</div>
      </button>

      <button class="service-btn" data-service="Copywriting" onclick="selectService(this)">
        <div class="service-icon">✍️</div>
        <div class="service-info">
          <div class="service-name">Copywriting</div>
          <div class="service-desc">Uandishi wa maudhui ya biashara</div>
        </div>
        <div class="check">✓</div>
      </button>

      <button class="service-btn" data-service="Mafunzo ya Google Marketing" onclick="selectService(this)">
        <div class="service-icon">🎓</div>
        <div class="service-info">
          <div class="service-name">Mafunzo ya Google Marketing</div>
          <div class="service-desc">Jifunze masoko ya kidijitali</div>
        </div>
        <div class="check">✓</div>
      </button>

    </div>

    <!-- Main form section -->
    <div id="formSection">
      <button class="submit-btn" id="submitBtn" onclick="sendToWhatsApp()" disabled>
        <span>💬</span> Tuma kwa WhatsApp
      </button>
    </div>

    <!-- Success state -->
    <div class="success" id="successState">
      <div class="success-icon">✅</div>
      <h3>Asante sana!</h3>
      <p id="successMsg">Ombi lako limetumwa. Tutawasiliana nawe hivi karibuni.</p>
      <a href="#" id="whatsappLink" class="wa-link" target="_blank">
        <span>💬</span> Fungua WhatsApp
      </a>
    </div>

  </div>
</div>

<script>
  // Set time
  const now = new Date();
  document.getElementById('msgTime').textContent =
    now.toLocaleTimeString('sw', { hour: '2-digit', minute: '2-digit' });

  let selectedService = null;

  function selectService(btn) {
    // Deselect all
    document.querySelectorAll('.service-btn').forEach(b => b.classList.remove('selected'));
    // Select clicked
    btn.classList.add('selected');
    selectedService = btn.getAttribute('data-service');
    document.getElementById('countDisplay').textContent = '1';
    checkReady();
  }

  function checkReady() {
    const name = document.getElementById('userName').value.trim();
    document.getElementById('submitBtn').disabled = !(selectedService && name.length > 1);
  }

  document.getElementById('userName').addEventListener('input', checkReady);

  function sendToWhatsApp() {
    const name = document.getElementById('userName').value.trim();
    if (!selectedService || !name) return;

    // Replace with your WhatsApp number (international format, no + or spaces)
    const phone = '255755320635';
    const msg = encodeURIComponent(
      `Habari! 👋 Mimi ni *${name}*.\n\nNataka kujua zaidi kuhusu huduma ya:\n✅ *${selectedService}*\n\nTafadhali nieleze zaidi.`
    );

    const waUrl = `https://wa.me/${phone}?text=${msg}`;

    // Show success
    document.getElementById('formSection').style.display = 'none';
    const success = document.getElementById('successState');
    success.classList.add('show');
    document.getElementById('successMsg').textContent =
      `Asante ${name}! Bonyeza kitufe hapa chini kuwasiliana nasi kuhusu "${selectedService}".`;
    document.getElementById('whatsappLink').href = waUrl;
  }
</script>
</body>
</html>
